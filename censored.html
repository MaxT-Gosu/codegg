<!DOCTYPE html>

<head>

<style>
:root {
    --bg-color: #0a0a0a;
    --accent-color: #E50914; 
    --card-bg: #1a1a1a;
    --skeleton-bg: #222;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family: 'Roboto', Arial, sans-serif;
    background: var(--bg-color);
    color: #fff;
    padding-top: 20px;
    padding-bottom: 100px;
}

/* ---------- ANIMACIÓN CARGA ---------- */
@keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
}
.skeleton {
    background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
}

.container {
    padding: 0 10px;
}

/* ---------- GRID ---------- */
.anime-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr); 
    gap: 10px;
}

.anime-card {
    position: relative;
    background: var(--card-bg);
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 2 / 3;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    transition: transform 0.3s ease;
    cursor: pointer;
}

.anime-card:active {
    transform: scale(0.95);
}

.anime-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.5s ease;
}

/* ---------- MENU INFERIOR ---------- */
.bottom-menu {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: rgba(15, 15, 15, 0.95);
    backdrop-filter: blur(15px);
    display: flex;
    justify-content: space-around;
    padding: 12px 0;
    z-index: 1000;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
}

.menu-item {
    text-decoration: none;
    color: #888;
    font-size: 11px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.menu-item i {
    font-size: 18px;
    margin-bottom: 5px;
}

.menu-item.active {
    color: var(--accent-color);
}
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<nav class="bottom-menu">

function cargarImagenes() {
    const grid = document.getElementById("anime-grid");
    
    grid.innerHTML = peliculas.map(p => `
        <div class="anime-card skeleton" onclick="abrirDetalles('${p.id}', '${p.titulo}', '${p.src}', '${p.video}', '${p.estudio}', '${p.actriz}')">
            <img src="${p.src}" onload="imgLoaded(this)" loading="lazy">
        </div>
    `).join("");
}

function abrirDetalles(id, titulo, imagen, video, estudio, actriz) {
    // Guardamos en la memoria para que detalles.html lo lea
    localStorage.setItem('peli_id', id);
    localStorage.setItem('peli_titulo', titulo);
    localStorage.setItem('peli_imagen', imagen);
    localStorage.setItem('peli_video', video);
    localStorage.setItem('peli_estudio', estudio);
    localStorage.setItem('peli_actriz', actriz);
    
    window.location.href = "detalles.html";
}

function imgLoaded(img) {
    img.style.opacity = "1";
    img.parentElement.classList.remove("skeleton");
}

document.addEventListener("DOMContentLoaded", cargarImagenes);
</script>
