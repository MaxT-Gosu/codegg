<style>
:root {
    --bg-color: #0a0a0a;
    --accent-color: #E50914; 
    --card-bg: #1a1a1a;
    --skeleton-bg: #222;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family: 'Roboto', Arial, sans-serif;
    background: var(--bg-color);
    color: #fff;
    padding-top: 20px;
    padding-bottom: 100px;
}

/* ---------- ANIMACIÓN CARGA ---------- */
@keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
}
.skeleton {
    background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
}

.container {
    padding: 0 12px;
}

/* ---------- GRID ---------- */
.anime-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr); 
    gap: 10px;
}

.anime-card {
    position: relative;
    background: var(--card-bg);
    border-radius: 10px;
    overflow: hidden;
    aspect-ratio: 2 / 3;
    box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    transition: transform 0.2s ease;
    cursor: pointer;
}

.anime-card:active {
    transform: scale(0.96);
}

.anime-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.6s ease;
}

/* ---------- MENU INFERIOR ---------- */
.bottom-menu {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: rgba(15, 15, 15, 0.98);
    backdrop-filter: blur(20px);
    display: flex;
    justify-content: space-around;
    padding: 12px 0;
    z-index: 1000;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
}

.menu-item {
    text-decoration: none;
    color: #777;
    font-size: 11px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.menu-item i {
    font-size: 18px;
    margin-bottom: 4px;
}

.menu-item.active {
    color: var(--accent-color);
}

@media(min-width:768px){
    .anime-grid { grid-template-columns: repeat(5, 1fr); gap: 15px; }
}
</style>

function cargarContenido() {
    const grid = document.getElementById("anime-grid");
    grid.innerHTML = peliculas.map(p => `
        <div class="anime-card skeleton" onclick="abrirDetalles('${p.id}', '${p.titulo}', '${p.src}', '${p.video}', '${p.estudio}', '${p.actriz}')">

function abrirDetalles(id, titulo, imagen, video, estudio, actriz) {
    localStorage.setItem('peli_id', id);

    window.location.href = "detalles.html";
}

function revealImg(img) {

}
