<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uncensored - JavGG</title>
    <style>
        :root { --bg-color: #0a0a0a; --accent-color: #E50914; --card-bg: #1a1a1a; --skeleton-bg: #222; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{ font-family: 'Roboto', sans-serif; background: var(--bg-color); color: #fff; padding: 20px 0 100px 0; }
        
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton { background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        
        .container { padding: 0 12px; }

        /* BUSCADOR */
        .search-container { margin-bottom: 20px; padding: 0 5px; }
        .search-box { background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; padding: 10px 15px; border: 1px solid #333; }
        .search-box i { color: #888; margin-right: 10px; }
        .search-box input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 14px; }

        .anime-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .anime-card { position: relative; background: var(--card-bg); border-radius: 10px; overflow: hidden; aspect-ratio: 2 / 3; box-shadow: 0 4px 15px rgba(0,0,0,0.6); transition: transform 0.2s ease; cursor: pointer; }
        .anime-card img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.6s ease; }
        
        /* ID Flotante en la card para que el buscador lo encuentre */
        .card-id-tag { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); font-size: 9px; text-align: center; padding: 2px 0; color: #aaa; }

        .bottom-menu { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .menu-item { text-decoration: none; color: #888; font-size: 11px; display: flex; flex-direction: column; align-items: center; background: none; border: none; cursor: pointer; }
        .menu-item i { font-size: 18px; margin-bottom: 5px; }
        .menu-item.active { color: var(--accent-color); }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="container">
    <h2 style="margin-bottom: 15px; font-size: 18px; padding-left: 5px;">Uncensored Movies</h2>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="input-buscador" placeholder="Buscar ID...">
        </div>
    </div>

    <div class="anime-grid" id="anime-grid"></div>
</div>

<nav class="bottom-menu">
    <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="censored.html" class="menu-item"><i class="fas fa-film"></i><span>Censored</span></a>
    <a href="uncensored.html" class="menu-item active"><i class="fas fa-tv"></i><span>Uncensored</span></a>
    <button class="menu-item" onclick="document.getElementById('input-buscador').focus()"><i class="fas fa-search"></i><span>Buscar</span></button>
</nav>

<script src="peliculas.js"></script>

<script>
const peliculasLocal = [
    { id: "NGOD-170", src: "https://i.ibb.co/wNV1TShf/NGOD-170.webp" },

    { id: "GVH-255", src: "https://i.ibb.co/jPd7hpHB/GVH-255.jpg" },
    { id: "MIAA-685", src: "https://i.ibb.co/pj8PhVfH/MIAA-685.jpg" },
    { id: "MEYD-671", src: "https://i.ibb.co/HLTmDv2b/MEYD-671.jpg" },
    { id: "JUL-908", src: "https://i.ibb.co/Y48wTByV/JUL-908.jpg" },
    { id: "81-RFPM05-TL-AC-SL1500", src: "https://i.ibb.co/9J0B3TY/81-RFPM05-TL-AC-SL1500.jpg" },
    { id: "IPIT-006", src: "https://i.postimg.cc/NjRkdLVq/IPIT-006.webp" },
    { id: "JUR-669", src: "https://i.postimg.cc/tTSbvWGf/JUR-669.webp" },
    { id: "IPIT-004", src: "https://i.postimg.cc/7ZHcNWWV/IPIT-004.webp" },
    { id: "FPRE-222", src: "https://i.postimg.cc/nzZqv4C7/FPRE-222-(1).webp" },
    { id: "099NTK-892", src: "https://i.postimg.cc/yNcgspLV/099NTK-892-(1).webp" },
    { id: "DLDSS-483", src: "https://i.postimg.cc/XJFkgc9s/DLDSS-483.webp" },
    { id: "AMBI-108", src: "https://i.postimg.cc/LXnPD5Lz/AMBI-108.webp" },
    { id: "NUKA-081", src: "https://i.postimg.cc/TPH7jsz8/NUKA-081.webp" },
    { id: "MIAB-433", src: "https://i.postimg.cc/3xXkyrJ4/MIAB-433.webp" },
    { id: "VAGU-158", src: "https://i.postimg.cc/G3kbh7K2/VAGU-158.webp" },

    { id: "fkLPYb9", src: "https://iili.io/fkLPYb9.jpg" }
];

function cargarContenido() {
    const grid = document.getElementById("anime-grid");
    grid.innerHTML = peliculasLocal.map(p => `
        <div class="anime-card skeleton" onclick="abrirDetalles('${p.id}', '${p.src}')">
            <img src="${p.src}" onload="revealImg(this)" loading="lazy">
            <div class="card-id-tag">${p.id}</div>
        </div>
    `).join("");
}

function abrirDetalles(id, imgFallback) {
    localStorage.clear();

    let p = null;
    if (typeof baseDeDatos !== 'undefined') {
        p = baseDeDatos.find(item => item.id === id);
    }

    if(p) {
        localStorage.setItem('peli_id', p.id);
        localStorage.setItem('peli_titulo', p.titulo);
        localStorage.setItem('peli_imagen', p.poster);
        localStorage.setItem('peli_background', p.bg || "");
        localStorage.setItem('peli_video', p.video);
        localStorage.setItem('peli_estudio', p.estudio);
        localStorage.setItem('peli_fecha', p.fecha || "No disponible");
        localStorage.setItem('peli_actriz', p.actriz || "Desconocida"); // CORREGIDO PARA ACTRIZ
        localStorage.setItem('peli_tags', p.tags || "");
    } else {
        localStorage.setItem('peli_id', id);
        localStorage.setItem('peli_imagen', imgFallback);
        localStorage.setItem('peli_titulo', id);
        localStorage.setItem('peli_actriz', "Desconocida");
    }

    window.location.href = "detalles.html";
}

// LÓGICA DEL BUSCADOR
document.getElementById('input-buscador').addEventListener('input', (e) => {
    const texto = e.target.value.toLowerCase().trim();
    document.querySelectorAll('.anime-card').forEach(card => {
        const idpeli = card.querySelector('.card-id-tag').innerText.toLowerCase();
        card.style.display = idpeli.includes(texto) ? "block" : "none";
    });
});

function revealImg(img) {
    img.style.opacity = "1";
    img.parentElement.classList.remove("skeleton");
}

document.addEventListener("DOMContentLoaded", cargarContenido);
</script>
</body>
</html>
