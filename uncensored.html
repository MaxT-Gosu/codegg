<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uncensored - JavGG</title>

    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #E50914; 
            --card-bg: #1a1a1a;
            --skeleton-bg: #222;
        }

        *{margin:0;padding:0;box-sizing:border-box}

        body{
            font-family: 'Roboto', Arial, sans-serif;
            background: var(--bg-color);
            color: #fff;
            padding-top: 20px;
            padding-bottom: 100px;
        }

        /* ---------- ANIMACIÓN CARGA ---------- */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        .container { padding: 0 12px; }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px;
        }

        .anime-card {
            position: relative;
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 2 / 3;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .anime-card:active { transform: scale(0.96); }

        .anime-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 15, 15, 0.98);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1000;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .menu-item {
            text-decoration: none;
            color: #777;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .menu-item i { font-size: 18px; margin-bottom: 4px; }
        .menu-item.active { color: var(--accent-color); }

        @media(min-width:768px){
            .anime-grid { grid-template-columns: repeat(5, 1fr); gap: 15px; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="container">
    <h2 style="margin-bottom: 15px; font-size: 18px; padding-left: 5px;">Uncensored Movies</h2>
    <div class="anime-grid" id="anime-grid"></div>
</div>

<nav class="bottom-menu">
    <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="censored.html" class="menu-item"><i class="fas fa-film"></i><span>Censored</span></a>
    <a href="uncensored.html" class="menu-item active"><i class="fas fa-tv"></i><span>Uncensored</span></a>
    <a href="#" class="menu-item"><i class="fas fa-search"></i><span>Buscar</span></a>
</nav>

<script>
const peliculas = [
    { id: "NGOD-170", src: "https://i.ibb.co/wNV1TShf/NGOD-170.webp", bg: "https://pics.dmm.co.jp/digital/video/ngod00170/ngod00170jp-14.jpg", titulo: "NGOD-170 Uncensored", video: "https://appcine.b-cdn.net/Codegg/NGOD-170.mp4", estudio: "Jet Eizo" },
    { id: "MIDE-992", src: "https://cdn001.imggle.net/webp/poster/06032026/1773376012.webp", bg: "https://pics.dmm.co.jp/digital/video/mide00992/mide00992jp-2.jpg", titulo: "MIDE-992 Película", video: "", estudio: "Desconocido" },
    { id: "GVH-255", src: "https://i.ibb.co/jPd7hpHB/GVH-255.jpg", bg: "", titulo: "GVH-255 Película", video: "", estudio: "Desconocido" },
    { id: "MIAA-685", src: "https://i.ibb.co/pj8PhVfH/MIAA-685.jpg", bg: "", titulo: "MIAA-685 Película", video: "", estudio: "Desconocido" },
    { id: "JUL-908", src: "https://i.ibb.co/Y48wTByV/JUL-908.jpg", bg: "https://i.ibb.co/v4p52FgD/JUL-908.png", titulo: "JUL-908 Película", video: "https://appcine.b-cdn.net/Codegg/JUL-908.mp4", estudio: "Madman" },
    // ... Agrega el resto de tus películas siguiendo este formato
];

function cargarContenido() {
    const grid = document.getElementById("anime-grid");
    grid.innerHTML = peliculas.map(p => `
        <div class="anime-card skeleton" onclick="abrirDetalles('${p.id}', '${p.titulo}', '${p.src}', '${p.video}', '${p.estudio}', '${p.bg}')">
            <img src="${p.src}" onload="revealImg(this)" loading="lazy">
        </div>
    `).join("");
}

function abrirDetalles(id, titulo, imagen, video, estudio, background) {
    localStorage.setItem('peli_id', id);
    localStorage.setItem('peli_titulo', titulo);
    localStorage.setItem('peli_imagen', imagen); // Poster vertical
    localStorage.setItem('peli_video', video);
    localStorage.setItem('peli_estudio', estudio);
    // Si background viene vacío, guardamos una marca clara
    localStorage.setItem('peli_background', background || ""); 
    window.location.href = "detalles.html";
}

function revealImg(img) {
    img.style.opacity = "1";
    img.parentElement.classList.remove("skeleton");
}

document.addEventListener("DOMContentLoaded", cargarContenido);
</script>
</body>
</html>
