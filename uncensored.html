<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uncensored - JavGG</title>
    <style>
        :root { --bg-color: #0a0a0a; --accent-color: #E50914; --card-bg: #1a1a1a; --skeleton-bg: #222; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{ font-family: 'Roboto', sans-serif; background: var(--bg-color); color: #fff; padding: 20px 0 100px 0; }
        
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton { background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        
        .container { padding: 0 12px; }
        .anime-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .anime-card { position: relative; background: var(--card-bg); border-radius: 6px; overflow: hidden; aspect-ratio: 2 / 3; box-shadow: 0 4px 15px rgba(0,0,0,0.6); transition: transform 0.2s ease; cursor: pointer; }
        .anime-card img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.6s ease; }
        .card-id-tag { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); font-size: 9px; text-align: center; padding: 2px 0; color: #aaa; }

        /* BUSCADOR MODAL */
        #modal-busqueda { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 3000; padding: 20px; backdrop-filter: blur(15px); overflow-y: auto; }
        .search-box-modal { background: #1a1a1a; border-radius: 8px; display: flex; align-items: center; padding: 15px; border: 1px solid var(--accent-color); margin: 40px 0 20px 0; }
        .search-box-modal input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 18px; }
        .close-search { position: absolute; top: 15px; right: 20px; font-size: 30px; color: #fff; cursor: pointer; border: none; background: none; }
        
        #resultados-busqueda { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .res-item { background: #111; border-radius: 5px; overflow: hidden; cursor: pointer; aspect-ratio: 2/3; position: relative; border: 1px solid #222; }
        .res-item img { width: 100%; height: 100%; object-fit: cover; }
        .res-id { position: absolute; bottom: 0; width: 100%; background: rgba(229, 9, 20, 0.8); color: #fff; font-size: 10px; text-align: center; font-weight: bold; padding: 2px 0; }

        /* MENÚ INFERIOR (CORREGIDO A 3 BOTONES) */
        .bottom-menu { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .menu-item { text-decoration: none; color: #888; font-size: 11px; display: flex; flex-direction: column; align-items: center; background: none; border: none; cursor: pointer; width: 33.3%; }
        .menu-item i { font-size: 18px; margin-bottom: 5px; }
        .menu-item.active { color: var(--accent-color); }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div id="modal-busqueda">
    <button class="close-search" onclick="cerrarBuscador()">&times;</button>
    <div class="search-box-modal">
        <i class="fas fa-search" style="margin-right: 15px; color: #888;"></i>
        <input type="text" id="input-buscador" placeholder="Buscar por ID...">
    </div>
    <div id="resultados-busqueda"></div>
</div>

<div class="container">
    <h2 style="margin-bottom: 15px; font-size: 18px; padding-left: 5px; border-left: 3px solid var(--accent-color);">Uncensored / Reduce Mosaic</h2>
    <div class="anime-grid" id="anime-grid"></div>
</div>

<nav class="bottom-menu">
    <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="uncensored.html" class="menu-item active"><i class="fas fa-bolt"></i><span>Uncensored</span></a>
    <button class="menu-item" onclick="abrirBuscador()"><i class="fas fa-search"></i><span>Buscar</span></button>
</nav>

<script src="code.js"></script>

<script>
// Función para abrir detalles guardando todo en localStorage
function abrirDetalles(id, imgFallback) {
    localStorage.clear();
    // Buscar el objeto completo en la base de datos de code.js
    let p = (typeof baseDeDatos !== 'undefined') ? baseDeDatos.find(item => item.id === id) : null;

    if(p) {
        localStorage.setItem('peli_id', p.id);
        localStorage.setItem('peli_titulo', p.titulo);
        localStorage.setItem('peli_imagen', p.poster);
        localStorage.setItem('peli_background', p.bg || "");
        localStorage.setItem('peli_video', p.video);
        localStorage.setItem('peli_estudio', p.estudio);
        localStorage.setItem('peli_fecha', p.fecha || "No disponible");
        localStorage.setItem('peli_actriz', p.actriz || "Desconocida");
        localStorage.setItem('peli_tags', p.tags || "");
    } else {
        // Fallback si no está en la base de datos principal
        localStorage.setItem('peli_id', id);
        localStorage.setItem('peli_imagen', imgFallback);
        localStorage.setItem('peli_titulo', id);
    }
    window.location.href = "detalles.html";
}

function abrirBuscador() {
    document.getElementById('modal-busqueda').style.display = 'block';
    document.getElementById('input-buscador').focus();
}

function cerrarBuscador() {
    document.getElementById('modal-busqueda').style.display = 'none';
}

function revealImg(img) {
    img.style.opacity = "1";
    img.parentElement.classList.remove("skeleton");
}

window.onload = function() {
    // 1. Verificar base de datos
    if (typeof baseDeDatos === 'undefined') {
        window.baseDeDatos = []; 
        console.warn("Base de datos no encontrada.");
    }

    // 2. Cargar TODAS las películas de code.js en la grilla
    const grid = document.getElementById("anime-grid");
    
    // Aquí puedes decidir si mostrar TODAS o solo las que tengan el tag "Uncensored"
    // Para simplificar, mostramos todas las de code.js:
    grid.innerHTML = baseDeDatos.map(p => `
        <div class="anime-card skeleton" onclick="abrirDetalles('${p.id}', '${p.poster}')">
            <img src="${p.poster}" onload="revealImg(this)" loading="lazy">
            <div class="card-id-tag">${p.id}</div>
        </div>
    `).join("");

    // 3. Lógica del Buscador
    const buscador = document.getElementById('input-buscador');
    buscador.addEventListener('input', (e) => {
        const texto = e.target.value.toLowerCase().trim();
        const resultadosDiv = document.getElementById('resultados-busqueda');
        resultadosDiv.innerHTML = "";

        if (texto.length < 2 || baseDeDatos.length === 0) return;

        const filtrados = baseDeDatos.filter(p => p.id.toLowerCase().includes(texto));

        filtrados.forEach(p => {
            const item = document.createElement('div');
            item.className = 'res-item';
            item.onclick = () => abrirDetalles(p.id, p.poster);
            item.innerHTML = `<img src="${p.poster}"><div class="res-id">${p.id}</div>`;
            resultadosDiv.appendChild(item);
        });
    });
};
</script>
</body>
</html>
