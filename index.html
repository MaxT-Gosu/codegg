<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavGG - Premium Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-color: #0a0a0a; 
            --accent-color: #E50914; 
            --text-color: #ffffff;
            --nav-bg: rgba(20, 20, 20, 0.95);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* Hero */
        .hero {
            position: relative;
            width: 100%;
            height: 45vh;
            background-size: cover;
            background-position: center top;
            display: flex;
            align-items: flex-end;
            padding: 20px;
        }
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg-color) 10%, transparent 80%);
        }
        .hero-content { position: relative; z-index: 10; }
        .btn-hero {
            background: #fff; color: #000; border: none; padding: 10px 20px;
            border-radius: 4px; font-weight: bold; margin-top: 10px;
        }

        /* --- ESTILO DE SLIDER HORIZONTAL --- */
        .section { padding: 20px 0 10px 15px; }
        .section h2 { 
            font-size: 1rem; margin-bottom: 12px; 
            border-left: 3px solid var(--accent-color); padding-left: 8px; 
        }

        .slider-container {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-right: 15px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Oculta scroll en Firefox */
        }
        .slider-container::-webkit-scrollbar { display: none; } /* Oculta scroll en Chrome/Safari */

        /* Estilo para Agregados Recientes (Horizontales) */
        .card-landscape {
            flex: 0 0 240px; /* Ancho fijo para modo horizontal */
            aspect-ratio: 16/9;
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            scroll-snap-align: start;
            position: relative;
        }

        /* Estilo para Más Vistos (Verticales) */
        .card-portrait {
            flex: 0 0 120px; /* Ancho fijo para modo vertical */
            aspect-ratio: 2/3;
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            scroll-snap-align: start;
            position: relative;
        }

        .card-landscape img, .card-portrait img {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transition: opacity 0.5s;
        }

        .card-id {
            position: absolute; bottom: 5px; left: 5px;
            background: rgba(0,0,0,0.7); padding: 2px 5px;
            font-size: 9px; border-radius: 2px;
        }

        /* Navegación Inferior */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 65px;
            background: var(--nav-bg); display: flex;
            justify-content: space-around; align-items: center;
            border-top: 1px solid #222; z-index: 1000; backdrop-filter: blur(10px);
        }
        .nav-item { color: #888; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 11px; }
        .nav-item.active { color: var(--accent-color); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        /* Skeletons */
        .skeleton { background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%); background-size: 200% 100%; animation: pulse 1.5s infinite linear; }
        @keyframes pulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

    <div class="hero" id="main-hero">
        <div class="hero-content">
            <h2 id="hero-title">---</h2>
            <button class="btn-hero" id="btn-hero-play"><i class="fas fa-play"></i> VER AHORA</button>
        </div>
    </div>

    <div class="section">
        <h2>Agregados Recientes</h2>
        <div class="slider-container" id="slider-recientes"></div>
    </div>

    <div class="section">
        <h2>Más Vistos</h2>
        <div class="slider-container" id="slider-vistos"></div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="uncensored.html" class="nav-item"><i class="fas fa-bolt"></i><span>Uncensored</span></a>
        <div class="nav-item" onclick="abrirBuscador()"><i class="fas fa-search"></i><span>Buscar</span></div>
    </nav>

    <script src="code.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof baseDeDatos === 'undefined') return;

            // 1. Hero Aleatorio
            const randomPeli = baseDeDatos[Math.floor(Math.random() * baseDeDatos.length)];
            const heroDiv = document.getElementById('main-hero');
            heroDiv.style.backgroundImage = `url('${randomPeli.bg || randomPeli.poster}')`;
            document.getElementById('hero-title').innerText = randomPeli.id;
            document.getElementById('btn-hero-play').onclick = () => verDetalle(randomPeli.id);

            // 2. Agregados Recientes (Usa "bg" y clase "card-landscape")
            const recientes = [...baseDeDatos].reverse().slice(0, 10);
            const containerRecientes = document.getElementById('slider-recientes');
            containerRecientes.innerHTML = recientes.map(p => `
                <div class="card-landscape skeleton" onclick="verDetalle('${p.id}')">
                    <img src="${p.bg || p.poster}" onload="this.style.opacity='1'; this.parentElement.classList.remove('skeleton')">
                    <div class="card-id">${p.id}</div>
                </div>
            `).join('');

            // 3. Más Vistos (Usa "poster" y clase "card-portrait")
            const vistos = obtenerMasVistosCache();
            const containerVistos = document.getElementById('slider-vistos');
            containerVistos.innerHTML = vistos.map(p => `
                <div class="card-portrait skeleton" onclick="verDetalle('${p.id}')">
                    <img src="${p.poster}" onload="this.style.opacity='1'; this.parentElement.classList.remove('skeleton')">
                    <div class="card-id">${p.id}</div>
                </div>
            `).join('');
        });

        function obtenerMasVistosCache() {
            const AHORA = Date.now();
            const DIEZ_HORAS = 10 * 60 * 60 * 1000;
            const cache = JSON.parse(localStorage.getItem('vistos_cache'));

            if (cache && (AHORA - cache.timestamp < DIEZ_HORAS)) {
                return cache.ids.map(id => baseDeDatos.find(p => p.id === id)).filter(p => p);
            } else {
                const randoms = [...baseDeDatos].sort(() => 0.5 - Math.random()).slice(0, 10);
                localStorage.setItem('vistos_cache', JSON.stringify({
                    timestamp: AHORA,
                    ids: randoms.map(p => p.id)
                }));
                return randoms;
            }
        }

        function verDetalle(id) {
            localStorage.setItem('peli_id', id);
            window.location.href = 'detalles.html';
        }

        function abrirBuscador() { alert("Buscador modal aquí..."); } // Implementar según tu modal
    </script>
</body>
</html>
