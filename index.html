<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavGG - Premium Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-color: #141414; 
            --bg-color-alt: #1a1a1a; 
            --accent-color: #E50914; 
            --text-color: #ffffff;
            --text-color-sec: #b3b3b3; 
            --skeleton-bg: #222222; 
        }
        
        * { margin:0; padding:0; box-sizing:border-box; outline: none; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg-color); color: var(--text-color); overflow-x:hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Animación Shimmer */
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton { background: linear-gradient(90deg, var(--bg-color-alt) 25%, var(--skeleton-bg) 50%, var(--bg-color-alt) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
        
        .container { width:100%; padding-bottom:100px; }
        
        /* HEADER ESTILO CINEMAX */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%); 
            position: fixed; width: 100%; z-index: 100;
        }
        header h1 { font-size: 28px; color: var(--accent-color); font-weight: 900; letter-spacing: -1px; text-transform: uppercase; font-family: 'Arial Black', sans-serif;}

        /* HERO PREMIUM */
        .hero { 
            position: relative; width: 100%; height: 70vh; overflow: hidden; background: #000; 
        }
        .hero img { 
            width: 100%; height: 100%; object-fit: cover; object-position: top; opacity: 0; transition: opacity 1.2s ease-in-out; 
        }
        .hero::after { 
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, var(--bg-color) 2%, transparent 40%),
                        linear-gradient(to right, rgba(20,20,20,0.7) 0%, transparent 60%);
        }
        .hero-content { position: absolute; bottom: 10%; left: 5%; width: 90%; z-index: 10; }
        .hero-content h2 { font-size: clamp(22px, 6vw, 38px); font-weight: 900; margin-bottom: 15px; line-height: 1.1; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .hero-btns button { 
            background: var(--accent-color); color: #fff; border: none;
            padding: 12px 24px; font-size: 15px; font-weight: 700; 
            border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }

        /* SECCIONES Y GRIDS */
        #sections-container { margin-top: -20px; position: relative; z-index: 20; }
        .section { margin-bottom: 25px; padding-left: 15px; }
        .section h2 { font-size: 17px; margin-bottom: 12px; font-weight: 700; color: var(--text-color); }
        
        .image-grid { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 12px; scrollbar-width: none; padding-right: 20px; }
        .image-grid::-webkit-scrollbar { display: none; }
        
        .card-item { flex-shrink: 0; width: 135px; cursor: pointer; transition: transform 0.2s; position: relative; display: flex; flex-direction: column; }
        .card-item:active { transform: scale(0.95); }
        
        .img-wrapper { width: 100%; aspect-ratio: 2/3; border-radius: 4px; overflow: hidden; background: var(--skeleton-bg); border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s; }
        
        /* Título (ID) debajo de la imagen */
        .image-title {
            font-size: 11px; color: var(--text-color-sec); margin-top: 6px; text-align: center; font-weight: bold;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* BUSCADOR */
        #modal-busqueda { display: none; position: fixed; inset: 0; background: rgba(20, 20, 20, 0.98); z-index: 2000; padding: 20px; backdrop-filter: blur(15px); overflow-y: auto; }
        .search-box-modal { background: rgba(255,255,255,0.1); border-radius: 4px; display: flex; align-items: center; padding: 12px 15px; margin-top: 60px; }
        .search-box-modal input { background: transparent; border: none; color: #fff; width: 100%; font-size: 16px; }
        .close-search { position: absolute; top: 20px; right: 20px; font-size: 24px; color: #fff; background: none; border: none; }
        
        #resultados-busqueda { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .res-item { background: var(--bg-color-alt); border-radius: 4px; overflow: hidden; aspect-ratio: 2/3; position: relative; }
        .res-item img { width: 100%; height: 100%; object-fit: cover; }
        .res-id { position: absolute; bottom: 0; width: 100%; background: rgba(229, 9, 20, 0.9); color: #fff; font-size: 9px; text-align: center; font-weight: bold; padding: 3px 0; }

        /* MENÚ INFERIOR */
        .bottom-menu { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .menu-item { display: flex; flex-direction: column; align-items: center; color: #888; text-decoration: none; font-size: 10px; background: none; border: none; cursor: pointer; width: 25%; font-weight: 500;}
        .menu-item i { font-size: 20px; margin-bottom: 5px; }
        .menu-item.active { color: var(--accent-color); }
    </style>
</head>
<body>

<div class="container">
    <header><h1>JavGG</h1></header>

    <div id="modal-busqueda">
        <button class="close-search" onclick="cerrarBuscador()">&times;</button>
        <div class="search-box-modal">
            <i class="fas fa-search" style="margin-right: 12px; color: var(--text-color-sec);"></i>
            <input type="text" id="input-buscador" placeholder="Buscar ID (ej: JUL-908)...">
        </div>
        <div id="resultados-busqueda"></div>
    </div>
    
    <div class="hero skeleton" id="hero-box">
        <img id="hero-img" src="" alt="">
        <div class="hero-content">
            <h2 id="hero-title">Cargando...</h2>
            <div class="hero-btns">
                <button id="hero-button"><i class="fas fa-play"></i> REPRODUCIR AHORA</button>
            </div>
        </div>
    </div>

    <div id="sections-container"></div>
</div>

<nav class="bottom-menu">
    <a href="index.html" class="menu-item active"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="censored.html" class="menu-item"><i class="fas fa-film"></i><span>Censored</span></a>
    <a href="uncensored.html" class="menu-item"><i class="fas fa-tv"></i><span>Uncensored</span></a>
    <button class="menu-item" onclick="abrirBuscador()"><i class="fas fa-search"></i><span>Buscar</span></button>
</nav>

<script src="peliculas.js"></script>

<script>
// --- LOGICA DE DATOS INTEGRADA ---
function abrirDetalles(id) {
    let db = (typeof baseDeDatos !== 'undefined') ? baseDeDatos : window.baseDeDatos;
    const p = db.find(item => item.id === id);
    if(p) {
        localStorage.setItem('peli_id', p.id);
        localStorage.setItem('peli_titulo', p.titulo);
        localStorage.setItem('peli_imagen', p.poster);
        localStorage.setItem('peli_background', p.bg || "");
        localStorage.setItem('peli_video', p.video);
        localStorage.setItem('peli_estudio', p.estudio);
        localStorage.setItem('peli_fecha', p.fecha || "No disponible");
        localStorage.setItem('peli_actriz', p.actriz || "Desconocida"); 
        localStorage.setItem('peli_tags', p.tags || "");
        window.location.href = "detalles.html";
    }
}

function abrirBuscador() {
    document.getElementById('modal-busqueda').style.display = 'block';
    document.getElementById('input-buscador').focus();
}

function cerrarBuscador() {
    document.getElementById('modal-busqueda').style.display = 'none';
}

window.onload = function() {
    if (typeof baseDeDatos === 'undefined') {
        window.baseDeDatos = [
            { id: "JUL-908", titulo: "JUL-908 Especial", poster: "https://i.ibb.co/Y48wTByV/JUL-908.jpg", bg: "https://i.ibb.co/v4p52FgD/JUL-908.png", video: "https://appcine.b-cdn.net/Codegg/JUL-908.mp4" },
            { id: "NGOD-170", titulo: "NGOD-170 Uncensored", poster: "https://i.ibb.co/wNV1TShf/NGOD-170.webp", bg: "https://pics.dmm.co.jp/digital/video/ngod00170/ngod00170jp-14.jpg", video: "https://appcine.b-cdn.net/Codegg/NGOD-170.mp4" }
        ];
    }

    let db = (typeof baseDeDatos !== 'undefined') ? baseDeDatos : window.baseDeDatos;

    // --- CARGAR HERO ---
    const pHero = db[0]; 
    if(pHero) {
        const imgHero = document.getElementById("hero-img");
        imgHero.src = pHero.bg || pHero.poster;
        document.getElementById("hero-title").innerText = pHero.titulo;
        document.getElementById("hero-button").onclick = () => abrirDetalles(pHero.id);
        imgHero.onload = () => {
            imgHero.style.opacity = '1';
            document.getElementById('hero-box').classList.remove('skeleton');
        };
    }

    const container = document.getElementById("sections-container");

    // --- 1. SECCIÓN: RECIENTES ---
    const secRecientes = crearSeccion("Agregados Recientes", "grid-recientes");
    container.appendChild(secRecientes);
    const gridRecientes = document.getElementById("grid-recientes");
    db.slice().reverse().slice(0, 8).forEach(p => {
        gridRecientes.appendChild(crearCard(p));
    });

    // --- 2. SECCIÓN: MÁS VISTOS (LÓGICA 24H) ---
    const secVistos = crearSeccion("Javs más vistos", "grid-vistos");
    container.appendChild(secVistos);
    const gridVistos = document.getElementById("grid-vistos");

    const horas24EnMs = 24 * 60 * 60 * 1000; 
    const tiempoActual = new Date().getTime();
    const tiempoGuardado = localStorage.getItem('vistos_timer');
    const idsGuardados = localStorage.getItem('vistos_ids');
    let peliculasAleatorias = [];

    if (tiempoGuardado && idsGuardados && (tiempoActual - parseInt(tiempoGuardado)) < horas24EnMs) {
        const arrayDeIds = JSON.parse(idsGuardados);
        peliculasAleatorias = db.filter(p => arrayDeIds.includes(p.id));
    } else {
        peliculasAleatorias = db.slice().sort(() => 0.5 - Math.random()).slice(0, 8);
        localStorage.setItem('vistos_ids', JSON.stringify(peliculasAleatorias.map(p => p.id)));
        localStorage.setItem('vistos_timer', tiempoActual.toString());
    }

    peliculasAleatorias.forEach(p => {
        gridVistos.appendChild(crearCard(p));
    });

    // --- FUNCIONES AUXILIARES ---
    function crearSeccion(titulo, idGrid) {
        const div = document.createElement("div");
        div.className = "section";
        div.innerHTML = `<h2>${titulo}</h2><div class="image-grid" id="${idGrid}"></div>`;
        return div;
    }

    function crearCard(p) {
        const card = document.createElement("div");
        card.className = "card-item";
        card.onclick = () => abrirDetalles(p.id);
        card.innerHTML = `
            <div class="img-wrapper skeleton">
                <img src="${p.poster}" onload="this.style.opacity='1'; this.parentElement.classList.remove('skeleton')" loading="lazy">
            </div>
            <div class="image-title">${p.id}</div>
        `;
        return card;
    }

    // --- BUSCADOR ---
    const buscador = document.getElementById('input-buscador');
    buscador.addEventListener('input', (e) => {
        const texto = e.target.value.toLowerCase().trim();
        const resultadosDiv = document.getElementById('resultados-busqueda');
        resultadosDiv.innerHTML = "";
        if (texto.length < 2) return;
        db.filter(p => p.id.toLowerCase().includes(texto)).forEach(p => {
            const item = document.createElement('div');
            item.className = 'res-item';
            item.onclick = () => abrirDetalles(p.id);
            item.innerHTML = `<img src="${p.poster}"><div class="res-id">${p.id}</div>`;
            resultadosDiv.appendChild(item);
        });
    });
};
</script>
</body>
</html>
