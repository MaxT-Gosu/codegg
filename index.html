<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title id="page-title">JavGG</title>

<style>
:root {
    --bg-color: #0a0a0a;
    --accent-color: #E50914; 
    --card-bg: #1a1a1a;
    --skeleton-bg: #252525;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family: 'Roboto', sans-serif;
    background: var(--bg-color);
    color:#fff;
    overflow-x:hidden;
}

/* ---------- ANIMACIONES ---------- */
@keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
}
.skeleton {
    background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
}

.container{width:100%;padding-bottom:100px}

/* ---------- HEADER ---------- */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    position: absolute;
    width: 100%;
    z-index: 10;
}
header h1 {
    font-size: 26px;
    color: #fff;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
}

/* ---------- HERO ---------- */
.hero {
    position: relative;
    width: 100%;
    height: 65vh;
    overflow: hidden;
    margin-bottom: 20px;
}
.hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.8s ease;
}
.hero::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 60%;
    background: linear-gradient(to top, var(--bg-color), transparent);
}
.hero-content {
    position: absolute;
    bottom: 30px;
    left: 0;
    right: 0;
    padding: 0 20px;
    z-index: 5;
    text-align: center;
}
.hero-content h2 {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 15px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
}
.hero-content button {
    background: var(--accent-color);
    color: #fff;
    border: none;
    padding: 12px 30px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 auto;
    box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
}

/* ---------- SECCIONES ---------- */
.section { margin: 25px 0; padding-left: 15px; }
.section h2 { font-size: 18px; margin-bottom: 4px; font-weight: 700; }
.section p { font-size: 13px; color: #aaa; margin-bottom: 15px; }

.image-grid {
    display: flex;
    overflow-x: auto;
    gap: 12px;
    padding-right: 15px;
    scrollbar-width: none;
}
.image-grid::-webkit-scrollbar { display: none; }

.card-item { flex-shrink: 0; width: 140px; cursor: pointer; }
.img-wrapper {
    position: relative;
    width: 140px;
    height: 200px;
    border-radius: 8px;
    overflow: hidden;
    background: var(--skeleton-bg);
}
.image-grid img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s; }
.image-title {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    color: #fff;
    font-size: 11px;
    padding: 6px 2px;
    text-align: center;
}

/* ---------- MENU INFERIOR ---------- */
.bottom-menu {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: rgba(15, 15, 15, 0.95);
    backdrop-filter: blur(15px);
    display: flex;
    justify-content: space-around;
    padding: 12px 0;
    z-index: 1000;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
}
.menu-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #888;
    text-decoration: none;
    font-size: 11px;
}
.menu-item i { font-size: 18px; margin-bottom: 5px; }
.menu-item.active { color: var(--accent-color); }
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

function abrirDetalles(id, titulo, imagen, video, estudio, actriz) {
    localStorage.setItem('peli_id', id);
    localStorage.setItem('peli_titulo', titulo);
    localStorage.setItem('peli_imagen', imagen);
    localStorage.setItem('peli_video', video);
    localStorage.setItem('peli_estudio', estudio);
    localStorage.setItem('peli_actriz', actriz);
    window.location.href = "detalles.html";
}

function revealHero(img) {
    img.style.opacity = "1";
    document.getElementById("hero-box").classList.remove("skeleton");
}

function removeSkeleton(img) {
    img.style.opacity = "1";
    img.parentElement.classList.remove("skeleton");
}

const sectionsContainer = document.getElementById("sections-container");
CONFIG.sections.forEach(section => {
    const sectionDiv = document.createElement("div");
    sectionDiv.className = "section";
    sectionDiv.innerHTML = `<h2>${section.title}</h2><p>${section.subtitle}</p><div class="image-grid"></div>`;
    const grid = sectionDiv.querySelector(".image-grid");

    section.items.forEach(item => {
        const card = document.createElement("div");
        card.className = "card-item";
        card.onclick = () => abrirDetalles(item.id, item.titulo_largo, item.src, item.video, item.estudio, item.actriz);
        
        card.innerHTML = `
            <div class="img-wrapper skeleton">
                <img src="${item.src}" onload="removeSkeleton(this)" loading="lazy">
                <div class="image-title">${item.label}</div>
            </div>
        `;
        grid.appendChild(card);
    });
    sectionsContainer.appendChild(sectionDiv);
});
</script>
