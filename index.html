<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavGG - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-color: #0a0a0a; 
            --accent-color: #E50914; 
            --text-color: #ffffff;
            --nav-bg: rgba(20, 20, 20, 0.95);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            padding-bottom: 80px; 
        }

        /* Hero visual Dinámico */
        .hero {
            position: relative;
            width: 100%;
            height: 45vh;
            background-size: cover;
            background-position: center top;
            display: flex;
            align-items: flex-end;
            padding: 20px;
            transition: background 0.5s ease-in-out;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg-color) 10%, transparent 70%);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .btn-hero {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }

        /* Secciones de contenido */
        .section { padding: 20px 15px; }
        .section h2 { font-size: 1.1rem; margin-bottom: 15px; border-left: 4px solid var(--accent-color); padding-left: 10px; text-transform: uppercase; letter-spacing: 1px; }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .card-item {
            position: relative;
            aspect-ratio: 2/3;
            border-radius: 4px;
            overflow: hidden;
            background: #1a1a1a;
        }

        .card-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .card-id {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background: rgba(0,0,0,0.7);
            padding: 2px 5px;
            font-size: 9px;
            border-radius: 3px;
        }

        /* Barra de Navegación */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 65px;
            background: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #333;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .nav-item {
            color: #888;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
        }

        .nav-item.active { color: var(--accent-color); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        /* Buscador Modal */
        #modal-busqueda {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            padding: 20px;
        }

        .search-input {
            width: 100%;
            padding: 15px;
            background: #222;
            border: 1px solid var(--accent-color);
            color: white;
            border-radius: 5px;
            font-size: 16px;
        }

        /* Skeletons */
        .skeleton { background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%); background-size: 200% 100%; animation: pulse 1.5s infinite linear; }
        @keyframes pulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

    <div class="hero" id="main-hero">
        <div class="hero-content">
            <h2 id="hero-title">Cargando...</h2>
            <button class="btn-hero" id="btn-hero-play">VER AHORA</button>
        </div>
    </div>

    <div class="section">
        <h2>Agregados Recientes</h2>
        <div class="image-grid" id="grid-recientes"></div>
    </div>

    <div class="section">
        <h2>Más Vistos</h2>
        <div class="image-grid" id="grid-vistos"></div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="uncensored.html" class="nav-item">
            <i class="fas fa-bolt"></i>
            <span>Uncensored</span>
        </a>
        <div class="nav-item" onclick="abrirBuscador()">
            <i class="fas fa-search"></i>
            <span>Buscar</span>
        </div>
    </nav>

    <div id="modal-busqueda">
        <div style="display:flex; justify-content: space-between; margin-bottom:20px;">
            <h3>Buscar por ID</h3>
            <i class="fas fa-times" onclick="cerrarBuscador()"></i>
        </div>
        <input type="text" id="input-buscador" class="search-input" placeholder="Ej: NGOD-170...">
        <div id="resultados-busqueda" style="margin-top:20px;"></div>
    </div>

    <script src="code.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof baseDeDatos === 'undefined') return;

            // 1. HERO ALEATORIO (Cada vez que entra)
            const randomPeli = baseDeDatos[Math.floor(Math.random() * baseDeDatos.length)];
            const heroDiv = document.getElementById('main-hero');
            heroDiv.style.backgroundImage = `url('${randomPeli.bg || randomPeli.poster}')`;
            document.getElementById('hero-title').innerText = randomPeli.id;
            document.getElementById('btn-hero-play').onclick = () => verDetalle(randomPeli.id);

            // 2. AGREGADOS RECIENTES (Últimos 10)
            const recientes = [...baseDeDatos].reverse().slice(0, 10);
            renderGrid(recientes, 'grid-recientes');

            // 3. MÁS VISTOS (10 aleatorios cada 10 horas)
            const vistos = obtenerMasVistosCache();
            renderGrid(vistos, 'grid-vistos');
        });

        // Lógica de caché de 10 horas para "Más Vistos"
        function obtenerMasVistosCache() {
            const AHORA = Date.now();
            const DIEZ_HORAS = 10 * 60 * 60 * 1000;
            const cache = JSON.parse(localStorage.getItem('vistos_cache'));

            if (cache && (AHORA - cache.timestamp < DIEZ_HORAS)) {
                // Reconstruir lista desde los IDs guardados para asegurar que existan en code.js
                return cache.ids.map(id => baseDeDatos.find(p => p.id === id)).filter(p => p);
            } else {
                // Generar nuevos aleatorios
                const randoms = [...baseDeDatos].sort(() => 0.5 - Math.random()).slice(0, 10);
                localStorage.setItem('vistos_cache', JSON.stringify({
                    timestamp: AHORA,
                    ids: randoms.map(p => p.id)
                }));
                return randoms;
            }
        }

        function renderGrid(lista, elementId) {
            const grid = document.getElementById(elementId);
            grid.innerHTML = lista.map(p => `
                <div class="card-item skeleton" onclick="verDetalle('${p.id}')">
                    <img src="${p.poster}" onload="this.style.opacity='1'; this.parentElement.classList.remove('skeleton')">
                    <div class="card-id">${p.id}</div>
                </div>
            `).join('');
        }

        function verDetalle(id) {
            localStorage.setItem('peli_id', id);
            window.location.href = 'detalles.html';
        }

        // Buscador
        function abrirBuscador() { document.getElementById('modal-busqueda').style.display = 'block'; }
        function cerrarBuscador() { document.getElementById('modal-busqueda').style.display = 'none'; }

        document.getElementById('input-buscador').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const resDiv = document.getElementById('resultados-busqueda');
            resDiv.innerHTML = "";
            if(query.length < 2) return;

            baseDeDatos.filter(p => p.id.toLowerCase().includes(query)).forEach(p => {
                const d = document.createElement('div');
                d.style = "padding:10px; border-bottom:1px solid #333; display:flex; align-items:center; gap:10px;";
                d.onclick = () => verDetalle(p.id);
                d.innerHTML = `<img src="${p.poster}" width="40" height="60" style="object-fit:cover;"> <span>${p.id}</span>`;
                resDiv.appendChild(d);
            });
        });
    </script>
</body>
</html>
