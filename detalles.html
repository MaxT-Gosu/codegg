<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles - JavGG</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #E50914; 
            --bg: #050505;
            --surface: #121212;
            --text-secondary: #a0a0a0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Roboto', sans-serif;
            color: #fff;
            padding-bottom: 110px;
            overflow-x: hidden;
        }

        /* --- BOTÓN VOLVER --- */
        .back-floating {
            position: fixed;
            top: 25px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- CABECERA HERO --- */
        .hero-container {
            position: relative;
            width: 100%;
            height: 55vh;
            overflow: hidden;
        }

        #hero-bg {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center top;
            transition: 0.5s;
        }

        .hero-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg) 0%, transparent 60%);
        }

        /* --- INFO PRINCIPAL --- */
        .main-content {
            padding: 0 20px;
            margin-top: -60px;
            position: relative;
            z-index: 10;
        }

        .id-badge {
            background: var(--primary);
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 900;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(229, 9, 20, 0.4);
        }

        h1 { font-size: 28px; margin: 0; font-weight: 900; line-height: 1.2; }

        /* --- BOTÓN REPRODUCIR --- */
        .play-section {
            display: flex;
            justify-content: center;
            padding: 30px 20px;
        }

        .play-btn {
            background: #fff;
            color: #000;
            border: none;
            width: 100%;
            max-width: 400px;
            padding: 16px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
        }

        /* --- FICHA TÉCNICA --- */
        .specs-container { padding: 0 20px; }

        .spec-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
        }

        .spec-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            display: block;
        }

        .spec-value { font-size: 15px; font-weight: 700; color: #eee; }

        /* --- MENÚ INFERIOR --- */
        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            z-index: 1000;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
        .menu-item {
            text-decoration: none;
            color: #666;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .menu-item i { font-size: 20px; }
        .menu-item.active { color: var(--primary); }

        /* --- PLAYER --- */
        #movie-player {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
        }
        #movie-player video { width: 100%; height: 100%; }
        .close-player {
            position: absolute;
            top: 30px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 10001;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

<a href="javascript:history.back()" class="back-floating">
    <i class="fas fa-chevron-left"></i>
</a>

<div class="hero-container">
    <div id="hero-bg"></div>
</div>

<div class="main-content">
    <span class="id-badge" id="badge-id">---</span>
    <h1 id="movie-title">---</h1>
</div>

<div class="play-section">
    <button class="play-btn" onclick="playMovie()">
        <i class="fas fa-play"></i> REPRODUCIR AHORA
    </button>
</div>

<div class="specs-container">
    <div class="spec-card">
        <span class="spec-label">Estudio</span>
        <span class="spec-value" id="val-estudio">---</span>
    </div>
</div>

<nav class="bottom-menu">
    <a href="index.html" class="menu-item"><i class="fas fa-house"></i><span>Home</span></a>
    <a href="censored.html" class="menu-item"><i class="fas fa-film"></i><span>Censored</span></a>
    <a href="uncensored.html" class="menu-item"><i class="fas fa-tv"></i><span>Uncensored</span></a>
    <a href="#" class="menu-item"><i class="fas fa-magnifying-glass"></i><span>Buscar</span></a>
</nav>

<div id="movie-player">
    <button class="close-player" onclick="closeMovie()">
        <i class="fas fa-times"></i>
    </button>
    <video id="player" controls controlsList="nodownload"></video>
</div>

<script>
    // 1. OBTENER INFORMACIÓN DE LA MEMORIA
    const peliInfo = {
        id: localStorage.getItem('peli_id') || "N/A",
        titulo: localStorage.getItem('peli_titulo') || "Sin título",
        imagen: localStorage.getItem('peli_imagen') || "", // Poster vertical
        background: localStorage.getItem('peli_background') || "", // Imagen horizontal
        video: localStorage.getItem('peli_video') || "",
        estudio: localStorage.getItem('peli_estudio') || "Desconocido"
    };

    // 2. INYECTAR DATOS EN LA PANTALLA
    // Ajuste de seguridad: Usamos comillas para evitar errores con URLs raras
    const fondoFinal = (peliInfo.background && peliInfo.background !== "" && peliInfo.background !== "null") 
                       ? peliInfo.background 
                       : peliInfo.imagen;

    document.getElementById("hero-bg").style.backgroundImage = "url('" + fondoFinal + "')";
    
    document.getElementById("movie-title").innerText = peliInfo.titulo;
    document.getElementById("badge-id").innerText = peliInfo.id;
    document.getElementById("val-estudio").innerText = peliInfo.estudio;

    const playerContainer = document.getElementById("movie-player");
    const videoTag = document.getElementById("player");

    function playMovie() {
        if(!peliInfo.video || peliInfo.video === "") {
            alert("⚠️ Error: El enlace de video no está disponible.");
            return;
        }

        // --- PUBLICIDAD ---
        var ads = document.createElement('script');
        ads.src = "https://pl28830826.effectivegatecpm.com/f3/b4/c4/f3b4c4bf072cc38a7a4398bffc1364e6.js";
        document.body.appendChild(ads);

        videoTag.src = peliInfo.video;
        playerContainer.style.display = "block";
        videoTag.play();
        document.body.style.overflow = "hidden"; 
    }

    function closeMovie() {
        videoTag.pause();
        videoTag.src = "";
        playerContainer.style.display = "none";
        document.body.style.overflow = "auto";
    }
</script>

</body>
</html>
