<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles - JavGG</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --primary: #E50914; --bg: #0a0a0a; --link: #58a6ff; }
        body { margin: 0; background: var(--bg); font-family: 'Roboto', sans-serif; color: #fff; padding-bottom: 100px; }
        
        /* CABECERA */
        .hero { position: relative; width: 100%; height: 42vh; background: #000; overflow: hidden; }
        #hero-bg { width: 100%; height: 100%; background-size: cover; background-position: center top; opacity: 0.7; }
        .hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--bg), transparent 90%); }

        /* SECCIÓN TÍTULO Y BOTÓN (ESTILO NETFLIX) */
        .header-content { padding: 0 20px; margin-top: -50px; position: relative; z-index: 10; text-align: left; }
        .badge { background: var(--primary); padding: 3px 8px; border-radius: 3px; font-weight: 900; font-size: 12px; margin-bottom: 8px; display: inline-block; }
        h1 { font-size: 24px; margin: 0 0 15px 0; line-height: 1.2; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        
        /* BOTÓN REPRODUCIR ARRIBA */
        .btn-play { 
            background: #fff; 
            color: #000; 
            border: none; 
            width: 100%; 
            padding: 14px; 
            border-radius: 6px; 
            font-weight: 900; 
            font-size: 16px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* SECCIÓN DE INFO (ESTILO TU CAPTURA) */
        .info-box { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        .row { display: flex; align-items: center; font-size: 14px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
        .row i.arrow { color: #fff; margin-right: 10px; font-size: 10px; }
        .label { color: #fff; margin-right: 6px; font-weight: 400; }
        .value { color: var(--link); text-decoration: none; }

        .tag-list { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 4px; }
        .tag { color: var(--link); display: flex; align-items: center; gap: 6px; font-size: 14px; }

        /* MENÚ INFERIOR */
        .menu { position: fixed; bottom: 0; width: 100%; background: rgba(15,15,15,0.98); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 100; }
        .menu-item { color: #888; text-decoration: none; font-size: 11px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .menu-item i { font-size: 20px; margin-bottom: 4px; }
        .menu-item.active { color: var(--primary); }

        /* PLAYER */
        #player-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; }
        video { width: 100%; height: 100%; }
        .close { position: absolute; top: 30px; right: 20px; color: #fff; font-size: 35px; background: none; border: none; z-index: 2001; cursor: pointer; }
    </style>
</head>
<body>

<div class="hero">
    <div id="hero-bg"></div>
</div>

<div class="header-content">
    <span class="badge" id="p-id">---</span>
    <h1 id="p-title">Cargando...</h1>
    
    <button class="btn-play" onclick="play()">
        <i class="fas fa-play"></i> REPRODUCIR AHORA
    </button>
</div>

<div class="info-box">
    <div class="row">
        <i class="fas fa-caret-right arrow"></i>
        <span class="label">Release Day:</span>
        <span class="value">2026-04-07</span>
    </div>
    <div class="row">
        <i class="fas fa-caret-right arrow"></i>
        <span class="label">Studio:</span>
        <span class="value" id="p-studio">---</span>
    </div>
    <div class="row">
        <i class="fas fa-caret-right arrow"></i>
        <span class="label">Country:</span>
        <span class="value">Japan</span>
    </div>
    <div class="row" style="border:none;">
        <i class="fas fa-caret-right arrow"></i>
        <span class="label">Tags:</span>
        <div class="tag-list">
            <span class="tag"><i class="fas fa-tag"></i> Affair</span>
            <span class="tag"><i class="fas fa-tag"></i> Bride</span>
            <span class="tag"><i class="fas fa-tag"></i> Young Wife</span>
        </div>
    </div>
</div>

<nav class="menu">
    <a href="index.html" class="menu-item"><i class="fas fa-home"></i>Home</a>
    <a href="censored.html" class="menu-item"><i class="fas fa-film"></i>Censored</a>
    <a href="uncensored.html" class="menu-item"><i class="fas fa-tv"></i>Uncensored</a>
    <a href="#" class="menu-item"><i class="fas fa-search"></i>Buscar</a>
</nav>

<div id="player-overlay">
    <button class="close" onclick="closePlayer()">&times;</button>
    <video id="v" controls preload="none"></video>
</div>

<script>
    const data = {
        id: localStorage.getItem('peli_id'),
        title: localStorage.getItem('peli_titulo'),
        img: localStorage.getItem('peli_imagen'),
        bg: localStorage.getItem('peli_background'),
        video: localStorage.getItem('peli_video'),
        studio: localStorage.getItem('peli_estudio')
    };

    // Lógica de imagen de fondo
    const finalBg = (data.bg && data.bg !== "" && data.bg !== "null") ? data.bg : data.img;
    if(finalBg) {
        document.getElementById('hero-bg').style.backgroundImage = "url('" + finalBg + "')";
    }
    
    // Inyectar textos
    document.getElementById('p-title').innerText = data.title || "Sin título";
    document.getElementById('p-id').innerText = data.id || "N/A";
    document.getElementById('p-studio').innerText = data.studio || "Desconocido";

    function play() {
        if(!data.video) {
            alert("⚠️ Enlace de video no disponible actualmente.");
            return;
        }
        
        // Cargar publicidad
        var s = document.createElement('script');
        s.src = "https://pl28830826.effectivegatecpm.com/f3/b4/c4/f3b4c4bf072cc38a7a4398bffc1364e6.js";
        document.body.appendChild(s);

        const v = document.getElementById('v');
        v.src = data.video;
        document.getElementById('player-overlay').style.display = 'block';
        v.play();
    }

    function closePlayer() {
        const v = document.getElementById('v');
        v.pause();
        v.src = "";
        document.getElementById('player-overlay').style.display = 'none';
    }
</script>
</body>
</html>
