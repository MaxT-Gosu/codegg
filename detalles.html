<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles - JavGG</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #E50914; 
            --bg: #0a0a0a;
            --surface: #1e1e20;
            --text-secondary: #a0a0a0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Roboto', sans-serif;
            color: #fff;
            padding-bottom: 90px;
        }

        /* --- CABECERA --- */
        .hero-header {
            position: relative;
            height: 45vh;
            width: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            transition: background-image 0.5s ease;
        }

        .hero-header::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, var(--bg) 5%, transparent 80%);
        }

        .title-container {
            position: relative;
            z-index: 10;
            padding: 20px;
            width: 100%;
        }

        .id-badge {
            background: var(--primary);
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 13px;
            display: inline-block;
            margin-bottom: 10px;
        }

        h1 { font-size: 24px; margin: 0; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

        /* --- ACCIONES --- */
        .actions {
            display: grid;
            grid-template-columns: 2fr 1fr;
            padding: 20px;
            gap: 12px;
        }

        .btn {
            height: 50px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }

        .play-btn { background: #fff; color: #000; }
        .back-btn { background: var(--surface); color: #fff; border: 1px solid #333; }

        /* --- FICHA TÉCNICA --- */
        .details-list { padding: 10px 20px; }
        .detail-row {
            display: flex;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .detail-label {
            width: 100px;
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .detail-value { font-size: 15px; color: #efefef; }

        /* --- PLAYER --- */
        #movie-player {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
        }
        #movie-player video { width: 100%; height: 100%; }

        .close-player {
            position: absolute;
            top: 30px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 10000;
            border: 1px solid #444;
        }
    </style>
</head>
<body>
<nav class="bottom-menu">
    <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="censored.html" class="menu-item"><i class="fas fa-film"></i><span>Censored</span></a>
    <a href="uncensored.html" class="menu-item"><i class="fas fa-tv"></i><span>Uncensored</span></a>
</nav>

<div class="hero-header" id="hero-bg">
    <div class="title-container">
        <span class="id-badge" id="badge-id">Cargando...</span>
        <h1 id="movie-title">---</h1>
    </div>
</div>

<div class="actions">
    <button class="btn play-btn" onclick="playMovie()">
        <i class="fas fa-play"></i> REPRODUCIR
    </button>
    <button class="btn back-btn" onclick="window.location.href='index.html'">
        <i class="fas fa-arrow-left"></i> VOLVER
    </button>
</div>

<div class="details-list" id="info-list">
    </div>

<div id="movie-player">
    <button class="close-player" onclick="closeMovie()">
        <i class="fas fa-times"></i>
    </button>
    <video id="player" controls controlsList="nodownload"></video>
</div>

<script>
    // 1. LEER LA MEMORIA (Lo que guardó el index.html)
    const peliInfo = {
        id: localStorage.getItem('peli_id') || "N/A",
        titulo: localStorage.getItem('peli_titulo') || "Sin título",
        imagen: localStorage.getItem('peli_imagen') || "",
        video: localStorage.getItem('peli_video') || "",
        estudio: localStorage.getItem('peli_estudio') || "Desconocido",
        actriz: localStorage.getItem('peli_actriz') || "Desconocida"
    };

    // 2. INYECTAR EN EL HTML
    document.getElementById("hero-bg").style.backgroundImage = `url(${peliInfo.imagen})`;
    document.getElementById("movie-title").innerText = peliInfo.titulo;
    document.getElementById("badge-id").innerText = peliInfo.id;

    const list = document.getElementById("info-list");
    const detallesAMostrar = [
        { label: "Código", value: peliInfo.id },
        { label: "Estudio", value: peliInfo.estudio },
        { label: "Actriz", value: peliInfo.actriz }
    ];

    detallesAMostrar.forEach(d => {
        list.innerHTML += `
            <div class="detail-row">
                <div class="detail-label">${d.label}</div>
                <div class="detail-value">${d.value}</div>
            </div>
        `;
    });

    // 3. LÓGICA DEL REPRODUCTOR
    const playerContainer = document.getElementById("movie-player");
    const videoTag = document.getElementById("player");

    function playMovie() {
        if(!peliInfo.video) {
            alert("Enlace de video no encontrado");
            return;
        }
        videoTag.src = peliInfo.video;
        playerContainer.style.display = "block";
        videoTag.play();
        document.body.style.overflow = "hidden"; // Bloquea el scroll de la página
    }

    function closeMovie() {
        videoTag.pause();
        videoTag.src = "";
        playerContainer.style.display = "none";
        document.body.style.overflow = "auto"; // Libera el scroll
    }
</script>

</body>
</html>
