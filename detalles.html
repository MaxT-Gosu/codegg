<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles - JavGG</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #E50914; 
            --bg: #050505;
            --surface: #121212;
            --text-secondary: #a0a0a0;
            --link-blue: #58a6ff; /* El azul de los links de tu imagen */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Roboto', sans-serif;
            color: #fff;
            padding-bottom: 110px;
        }

        /* --- CABECERA HERO --- */
        .hero-container {
            position: relative;
            width: 100%;
            height: 50vh;
            background: #000;
        }

        #hero-bg {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center top;
            opacity: 0.7;
        }

        .hero-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
        }

        /* --- INFO PRINCIPAL --- */
        .main-content { padding: 0 20px; margin-top: -40px; position: relative; z-index: 10; }
        .id-badge { background: var(--primary); padding: 4px 10px; border-radius: 4px; font-weight: 900; font-size: 14px; display: inline-block; margin-bottom: 10px; }
        h1 { font-size: 24px; margin: 0 0 20px 0; line-height: 1.3; }

        /* --- SECCIÓN DE DETALLES (ESTILO IMAGEN) --- */
        .info-section {
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            font-size: 15px;
            line-height: 1.5;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 8px;
        }

        .info-row i {
            width: 20px;
            margin-right: 10px;
            color: #fff;
            font-size: 14px;
            margin-top: 4px;
        }

        .label-text {
            color: #fff;
            font-weight: 400;
            margin-right: 5px;
        }

        .value-text {
            color: var(--link-blue);
            text-decoration: none;
        }

        /* --- TAGS / ETIQUETAS --- */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }

        .tag-item {
            color: var(--link-blue);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
        }

        /* --- BOTÓN REPRODUCIR --- */
        .play-section { padding: 25px 20px; }
        .play-btn {
            background: #fff;
            color: #000;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }

        /* --- MENÚ INFERIOR --- */
        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 15, 15, 0.98);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1000;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .menu-item { display: flex; flex-direction: column; align-items: center; color: #888; text-decoration: none; font-size: 11px; }
        .menu-item i { font-size: 18px; margin-bottom: 5px; }
        .menu-item.active { color: var(--primary); }

        /* PLAYER */
        #movie-player { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; }
        #movie-player video { width: 100%; height: 100%; }
        .close-player { position: absolute; top: 30px; right: 20px; color: #fff; font-size: 30px; z-index: 10001; background: none; border: none; }
    </style>
</head>
<body>

<div class="hero-container">
    <div id="hero-bg"></div>
</div>

<div class="main-content">
    <span class="id-badge" id="badge-id">---</span>
    <h1 id="movie-title">Cargando...</h1>
</div>

<div class="info-section">
    <div class="info-row">
        <i class="fas fa-caret-right"></i>
        <span class="label-text">Release Day:</span>
        <span class="value-text" id="val-date">2026-04-07</span>
    </div>

    <div class="info-row">
        <i class="fas fa-caret-right"></i>
        <span class="label-text">Studio:</span>
        <span class="value-text" id="val-estudio">---</span>
    </div>

    <div class="info-row">
        <i class="fas fa-caret-right"></i>
        <span class="label-text">Country:</span>
        <span class="value-text">Japan</span>
    </div>

    <div class="info-row" style="border-bottom: none;">
        <i class="fas fa-caret-right"></i>
        <span class="label-text">Tags:</span>
        <div class="tags-container" id="val-tags">
            </div>
    </div>
</div>

<div class="play-section">
    <button class="play-btn" onclick="playMovie()">
        <i class="fas fa-play"></i> REPRODUCIR AHORA
    </button>
</div>

<nav class="bottom-menu">
    <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="censored.html" class="menu-item"><i class="fas fa-film"></i><span>Censored</span></a>
    <a href="uncensored.html" class="menu-item"><i class="fas fa-tv"></i><span>Uncensored</span></a>
    <a href="#" class="menu-item"><i class="fas fa-search"></i><span>Buscar</span></a>
</nav>

<div id="movie-player">
    <button class="close-player" onclick="closeMovie()">&times;</button>
    <video id="player" controls></video>
</div>

<script>
    const peliInfo = {
        id: localStorage.getItem('peli_id') || "N/A",
        titulo: localStorage.getItem('peli_titulo') || "Sin título",
        imagen: localStorage.getItem('peli_imagen') || "",
        background: localStorage.getItem('peli_background') || "",
        video: localStorage.getItem('peli_video') || "",
        estudio: localStorage.getItem('peli_estudio') || "Desconocido"
    };

    // Inyectar fondo y textos
    const fondo = peliInfo.background || peliInfo.imagen;
    document.getElementById("hero-bg").style.backgroundImage = `url('${fondo}')`;
    document.getElementById("movie-title").innerText = peliInfo.titulo;
    document.getElementById("badge-id").innerText = peliInfo.id;
    document.getElementById("val-estudio").innerText = peliInfo.estudio;

    // SIMULACIÓN DE TAGS (Como pediste, con el icono de etiqueta)
    const tagsMock = ["Affair", "Bride", "Creampie", "Cuckold", "Married Woman"];
    const tagsContainer = document.getElementById("val-tags");
    
    tagsMock.forEach(tag => {
        tagsContainer.innerHTML += `<span class="tag-item"><i class="fas fa-tag"></i> ${tag}</span>`;
    });

    // Función de video y publicidad
    function playMovie() {
        if(!peliInfo.video) return alert("Video no disponible");
        
        // Publicidad
        var ads = document.createElement('script');
        ads.src = "https://pl28830826.effectivegatecpm.com/f3/b4/c4/f3b4c4bf072cc38a7a4398bffc1364e6.js";
        document.body.appendChild(ads);

        document.getElementById("player").src = peliInfo.video;
        document.getElementById("movie-player").style.display = "block";
        document.getElementById("player").play();
    }

    function closeMovie() {
        document.getElementById("player").pause();
        document.getElementById("movie-player").style.display = "none";
    }
</script>

</body>
</html>
