<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles - JavGG</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --primary: #E50914; --bg: #0a0a0a; --link: #58a6ff; --accent-color: #E50914; }
        body { margin: 0; background: var(--bg); font-family: 'Roboto', sans-serif; color: #fff; padding-bottom: 100px; overflow-x: hidden; }
        
        /* HERO Y VISIBILIDAD CORREGIDA */
        .hero { position: relative; width: 100%; height: 45vh; background: #000; overflow: hidden; }
        #hero-bg { width: 100%; height: 100%; background-size: cover; background-position: center top; opacity: 1; transition: opacity 0.3s; }
        .hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 0%, transparent 70%); }

        .header-content { padding: 0 20px; margin-top: -60px; position: relative; z-index: 10; }
        .badge { background: var(--primary); padding: 3px 8px; border-radius: 3px; font-weight: 900; font-size: 12px; margin-bottom: 8px; display: inline-block; }
        h1 { font-size: 24px; margin: 0 0 15px 0; line-height: 1.2; text-shadow: 0 2px 15px rgba(0,0,0,0.9); }
        
        .btn-play { background: #fff; color: #000; border: none; width: 100%; padding: 15px; border-radius: 6px; font-weight: 900; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 25px; transition: transform 0.1s; }
        .btn-play:active { transform: scale(0.96); }

        .info-box { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        .row { display: flex; align-items: center; font-size: 14px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
        .row i.arrow { color: var(--primary); margin-right: 10px; font-size: 10px; }
        .label { color: #888; width: 100px; flex-shrink: 0; }
        .value { color: var(--link); font-weight: 700; word-break: break-word; }

        .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .tag { background: #1a1a1a; color: var(--link); padding: 4px 10px; border-radius: 4px; font-size: 12px; border: 1px solid #333; }

        /* REPRODUCTOR OVERLAY */
        #player-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; }
        video { width: 100%; height: 100%; background: #000; }
        .close { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 35px; background: rgba(0,0,0,0.5); border: none; z-index: 2001; cursor: pointer; width: 50px; height: 50px; border-radius: 50%; }

        /* MENÚ INFERIOR */
        .menu { position: fixed; bottom: 0; width: 100%; background: rgba(15,15,15,0.98); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 100; }
        .menu-item { color: #888; text-decoration: none; font-size: 11px; text-align: center; display: flex; flex-direction: column; align-items: center; width: 25%; background: none; border: none; }
        .menu-item i { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="hero"><div id="hero-bg"></div></div>

<div class="header-content">
    <span class="badge" id="p-id">---</span>
    <h1 id="p-title">Cargando...</h1>
    <button class="btn-play" onclick="iniciarTodo()"><i class="fas fa-play"></i> REPRODUCIR AHORA</button>
</div>

<div class="info-box">
    <div class="row"><i class="fas fa-caret-right arrow"></i><span class="label">Release:</span><span class="value" id="p-fecha">---</span></div>
    <div class="row"><i class="fas fa-caret-right arrow"></i><span class="label">Studio:</span><span class="value" id="p-studio">---</span></div>
    <div class="row"><i class="fas fa-caret-right arrow"></i><span class="label">Actriz:</span><span class="value" id="p-actriz">---</span></div>
    <div class="row" style="border:none;"><i class="fas fa-caret-right arrow"></i><span class="label">Tags:</span><div class="tag-list" id="p-tags"></div></div>
</div>

<div id="player-overlay">
    <button class="close" onclick="closePlayer()">&times;</button>
    <video id="v" controls playsinline></video>
</div>

<nav class="menu">
    <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="censored.html" class="menu-item"><i class="fas fa-film"></i><span>Censored</span></a>
    <a href="uncensored.html" class="menu-item"><i class="fas fa-tv"></i><span>Uncensored</span></a>
    <a href="#" class="menu-item"><i class="fas fa-search"></i><span>Buscar</span></a>
</nav>

<script>
    // Recuperar datos de la película
    const movieData = {
        id: localStorage.getItem('peli_id'),
        title: localStorage.getItem('peli_titulo'),
        img: localStorage.getItem('peli_imagen'),
        bg: localStorage.getItem('peli_background'),
        video: localStorage.getItem('peli_video'),
        studio: localStorage.getItem('peli_estudio'),
        fecha: localStorage.getItem('peli_fecha'),
        actriz: localStorage.getItem('peli_actriz'),
        tags: localStorage.getItem('peli_tags')
    };

    // Renderizar datos en pantalla
    const finalBg = (movieData.bg && movieData.bg !== "null") ? movieData.bg : movieData.img;
    if(finalBg) document.getElementById('hero-bg').style.backgroundImage = `url('${finalBg}')`;
    
    document.getElementById('p-title').innerText = movieData.title || "Sin título";
    document.getElementById('p-id').innerText = movieData.id || "N/A";
    document.getElementById('p-studio').innerText = movieData.studio || "Desconocido";
    document.getElementById('p-fecha').innerText = movieData.fecha || "No disponible";
    document.getElementById('p-actriz').innerText = movieData.actriz || "Desconocida";

    const tagsDiv = document.getElementById('p-tags');
    if(movieData.tags) {
        movieData.tags.split(',').forEach(tag => {
            const span = document.createElement('span');
            span.className = 'tag';
            span.innerText = tag.trim();
            tagsDiv.appendChild(span);
        });
    }

    // --- LÓGICA DE REPRODUCCIÓN Y PUBLICIDAD ---
    function iniciarTodo() {
        const smartLink = "https://www.profitablecpmratenetwork.com/jb6cyc4g?key=d42800bba4100981ec7c43105b7ea5e0";
        
        // 1. CARGAR VIDEO PRIMERO (Prioridad usuario)
        const videoElement = document.getElementById('v');
        if(!movieData.video || movieData.video === "null") {
            alert("Enlace de video no encontrado");
            return;
        }

        videoElement.src = movieData.video;
        document.getElementById('player-overlay').style.display = 'block';
        videoElement.play();

        // 2. LANZAR PUBLICIDAD (Prioridad ingresos)
        // Usamos window.location para que el WebView de Android Studio detecte el salto
        setTimeout(() => {
            try {
                window.open(smartLink, '_blank');
            } catch(e) {
                // Fallback si el popup es bloqueado
                window.location.assign(smartLink);
            }
        }, 800);
    }

    function closePlayer() {
        const v = document.getElementById('v');
        v.pause();
        v.src = "";
        document.getElementById('player-overlay').style.display = 'none';
    }
</script>

<script src="https://pl28809264.profitablecpmratenetwork.com/c0/d9/16/c0d91680a86a8674c7ea6ff6a910d928.js"></script>

<script src="https://pl28830826.profitablecpmratenetwork.com/f3/b4/c4/f3b4c4bf072cc38a7a4398bffc1364e6.js"></script>

</body>
</html>
